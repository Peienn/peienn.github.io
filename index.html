<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Peien's Notes</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
  
</head>

<body>

  <header>
    <h1>✨ Peien's Notes</h1>
    <p class="subtitle">技術、學習與生活記錄</p>
  </header>

  <div class="content-wrapper">
    <main>
      <!-- 分類篩選 -->
      <div class="category-filter" id="category-filter">
        <!-- 按鈕會由 JS 動態產生 -->
      </div>

      <!-- 文字說明區塊 -->
      <div id="intro-backend-slot"></div>
      <div id="intro-SRE-slot"></div>
      <div id="intro-sport-slot"></div>
      <div id="intro-AI_Generated-slot"></div>


      <!-- 文章列表 -->
      <div id="post-list">
        <p>🔄 載入文章中...</p>
      </div>
    </main>

    <aside>
      <div class="profile">
        <img src="/posts/images/index/profile.png" alt="Profile Photo" style="width:100%; border-radius: 50%;" />
        <h2>Peien Wu</h2>
        <p>軟體開發者。</p>
        <div class="social-links">
          <a href="https://github.com/peienn" target="_blank" title="GitHub">
            <i class="fab fa-github"></i>
          </a>
          <a href="https://leetcode.com/u/peiennn/" target="_blank" title="LeetCode">
            🧩
          </a>
          <a href="mailto:brent14789@gmail.com" title="Email">
            <i class="fas fa-envelope"></i>
          </a>
        </div>
      </div>

      <!-- 分類統計 -->
      <div class="category-stats">
        <!-- 內容會由 JS 動態產生 -->
      </div>
    </aside>
  </div>

  <footer>
    <p>© 2025 Peien Wu · Hosted on GitHub Pages</p>
  </footer>

  
  <script src="scripts/class_area.js" defer></script>
  <script src="scripts/main.js" defer></script>
</body>
</html>
