name: 每日 DevOps 文章生成

on:
  schedule:
    - cron: "0 0 * * *"   # 改回每天 UTC 00:00
  workflow_dispatch:
    inputs:
      topic:
        description: "自訂文章主題（留空則隨機選擇）"
        required: false
        default: ""

jobs:
  generate-article:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout 程式碼
        uses: actions/checkout@v4

      - name: 🐍 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 安裝相依套件
        run: pip install anthropic

      - name: 📝 產生 DevOps 文章
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ARTICLE_LANG: "zh-TW"
          ARTICLE_AUDIENCE: "intermediate"
          OUTPUT_DIR: "posts/markdown"
        run: |
          if [ -n "${{ github.event.inputs.topic }}" ]; then
            python article_ai/generate_article.py "${{ github.event.inputs.topic }}"
          else
            python article_ai/generate_article.py
          fi

      - name: 📋 取得剛產生的文章檔名        # ← 問題1 補上這個步驟
        id: get_filename
        run: |
          LATEST=$(ls -t posts/markdown/*.md | head -1)
          FILENAME=$(basename "$LATEST")
          echo "filepath=$LATEST" >> $GITHUB_OUTPUT
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT
          echo "產生的檔案：$FILENAME"

      - name: 📤 先推送文章 md 檔
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions Bot"
          git add posts/markdown/
          git diff --staged --quiet || git commit -m "🤖 AI_Gen: DevOps 文章 $(date +'%Y-%m-%d')"
          git push

      - name: 🗂️ 更新 posts.json
        run: |
          python article_ai/update_posts.py \
            "posts/posts.json" \
            "${{ steps.get_filename.outputs.filename }}" \
            "${{ steps.get_filename.outputs.filepath }}"

      - name: 📤 推送 posts.json
        run: |
          git add posts/posts.json
          git diff --staged --quiet || git commit -m "🗂️ 更新 posts.json $(date +'%Y-%m-%d')"
          git push
